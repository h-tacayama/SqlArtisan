name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          # Pinned by global.json so every environment resolves the same SDK
          # feature band (analyzer/format behavior differs across bands).
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SqlArtisan.sln

      - name: Verify formatting (.editorconfig)
        run: dotnet format SqlArtisan.sln --verify-no-changes

      - name: Build
        run: dotnet build SqlArtisan.sln --no-restore -c Release

      - name: Test
        run: dotnet test tests/SqlArtisan.Tests --no-build -c Release --verbosity normal

      - name: Test analyzer
        run: dotnet test tests/SqlArtisan.Analyzers.Tests --no-build -c Release --verbosity normal
